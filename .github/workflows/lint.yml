# What is the goal of your workflow
# Goal: Whwnever someone change the python code, the linter check if the syntax, format, indentation is correct or not.
name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    # this setps will automatically clone the code of the current branch into the runner
    
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7

- name: Install Linter
  run: pip install ruff
