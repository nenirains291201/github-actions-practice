# What is the goal of your workflow
# Goal: Whenever someone change the python code, the linter check if the syntax, format, indentation is correct or not.
name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest
    
    steps:
      # this setps will automatically clone the code of the current branch into the runner
      
      - name: Checkout/Clone the code
        uses: actions/checkout@v4

      - name: Install Linter
        run: pip install ruff
      # This step will run the linter
      - name: Check the files for linting
        run: ruff check .
